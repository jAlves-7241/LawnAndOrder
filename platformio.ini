[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed  = 115200
monitor_eol    = LF
monitor_echo   = no
monitor_filters = direct

board_build.filesystem = littlefs

build_flags =
    -std=gnu++14
    -DCORE_DEBUG_LEVEL=0
    -D LANG_UI_PT
    -D LANG_SERIAL_EN

lib_ldf_mode = deep

lib_deps =
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    adafruit/RTClib@^2.1.4
    adafruit/Adafruit BusIO@^1.16.1